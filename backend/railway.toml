# Railway 배포 설정 (백엔드).
# Railway 서비스 설정에서 Root Directory = "backend" 로 지정하면
# NIXPACKS 가 이 디렉터리의 pyproject.toml + uv.lock 을 보고 uv 로 의존성을 설치한다.
[build]
builder = "NIXPACKS"

[deploy]
# 콘솔 스크립트 트램폴린 회피 위해 python -m uvicorn 으로 실행. $PORT 는 Railway 가 주입.
startCommand = "uv run python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
