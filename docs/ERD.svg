  <text x="550" y="583" font-size="10.5" font-weight="600" fill="#1f1f1f">id<tspan dx="5" font-size="9" font-weight="400" fill="#8a8f98">PK</tspan></text>
  <text x="550" y="598" font-size="10.5" fill="#1f1f1f">대화<tspan dx="5" font-size="9" fill="#8a8f98">FK→알약사전</tspan></text>
  <text x="550" y="613" font-size="10.5" fill="#1f1f1f">버전<tspan dx="5" font-size="9" fill="#8a8f98">v1→v2…</tspan></text>
