  <text x="455" y="283" font-size="10.5" fill="#1f1f1f">상태<tspan dx="5" font-size="9" fill="#8a8f98">성공/모호/실패</tspan></text>
  <text x="455" y="298" font-size="10.5" fill="#1f1f1f">인식일시</text>
</g>

<!-- ===== 알약사전 conversations ===== -->
<g>
  <rect x="445" y="360" width="200" height="135" rx="8" fill="#f4f5f7" stroke="#d4d8e0"/>
  <path d="M445,384 V368 Q445,360 453,360 H637 Q645,360 645,368 V384 Z" fill="#3b5bdb"/>
