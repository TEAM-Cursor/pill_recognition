  <text x="455" y="398" font-size="10.5" font-weight="600" fill="#1f1f1f">id<tspan dx="5" font-size="9" font-weight="400" fill="#8a8f98">PK</tspan></text>
  <text x="455" y="413" font-size="10.5" fill="#1f1f1f">사용자<tspan dx="5" font-size="9" fill="#8a8f98">FK</tspan></text>
  <text x="455" y="428" font-size="10.5" fill="#1f1f1f">품목코드<tspan dx="5" font-size="9" fill="#8a8f98">FK?→약</tspan></text>
  <text x="455" y="443" font-size="10.5" fill="#1f1f1f">인식<tspan dx="5" font-size="9" fill="#8a8f98">FK?→인식</tspan></text>
