<svg width="1600" height="1120" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Malgun Gothic', ui-sans-serif, system-ui, -apple-system, sans-serif">
<title>pill_recognition 데이터 모델 (한국어)</title>
<desc>계정·건강정보, 인식·대화·요약, 약(식약처 캐시) 테이블 관계도</desc>
<rect x="0" y="0" width="1000" height="700" fill="#ffffff"/>

<!-- legend -->
<g transform="translate(20,20)">
  <rect x="0" y="0" width="12" height="12" rx="3" fill="#3b5bdb"/>
  <text x="18" y="10" font-size="11" fill="#6b7280">사용자 소유 데이터</text>
  <rect x="0" y="20" width="12" height="12" rx="3" fill="#495057"/>
  <text x="18" y="30" font-size="11" fill="#6b7280">공공API 참조(캐시)</text>
  <text x="0" y="52" font-size="11" fill="#6b7280">점선 = 선택 · 1·N = 카디널리티 · FK? = nullable</text>
</g>

<!-- connectors -->
<g stroke="#9aa3af" stroke-width="1.4" fill="none">
  <path d="M545,125 V170"/>
  <path d="M455,75 H135 V185"/>
  <path d="M480,125 H415 V430 H445"/>
  <path d="M545,305 V360" stroke-dasharray="4 3"/>
  <path d="M510,495 V520 H430 V545"/>
  <path d="M590,495 V520 H632 V545"/>
  <path d="M645,230 H775"/>
  <path d="M645,420 H710 V300 H775"/>
  <path d="M130,320 V360"/>
  <path d="M180,320 V340 H320 V360"/>
</g>

<!-- ===== 계정 users ===== -->
<g>
  <rect x="455" y="20" width="180" height="105" rx="8" fill="#f4f5f7" stroke="#d4d8e0"/>
  <path d="M455,44 V28 Q455,20 463,20 H627 Q635,20 635,28 V44 Z" fill="#3b5bdb"/>
  <text x="465" y="36" font-size="12" font-weight="600" fill="#fff">계정 <tspan font-size="9" fill-opacity="0.7">users</tspan></text>
  <text x="465" y="58" font-size="10.5" font-weight="600" fill="#1f1f1f">id<tspan dx="5" font-size="9" font-weight="400" fill="#8a8f98">PK</tspan></text>
  <text x="465" y="73" font-size="10.5" fill="#1f1f1f">이메일<tspan dx="5" font-size="9" fill="#8a8f98">고유</tspan></text>
  <text x="465" y="88" font-size="10.5" fill="#1f1f1f">비밀번호 해시</text>
  <text x="465" y="103" font-size="10.5" fill="#1f1f1f">닉네임</text>
  <text x="465" y="118" font-size="10.5" fill="#1f1f1f">가입일시</text>
</g>

<!-- ===== 건강정보 health_profiles ===== -->
<g>
  <rect x="35" y="185" width="200" height="135" rx="8" fill="#f4f5f7" stroke="#d4d8e0"/>
  <path d="M35,209 V193 Q35,185 43,185 H227 Q235,185 235,193 V209 Z" fill="#3b5bdb"/>
  <text x="45" y="201" font-size="12" font-weight="600" fill="#fff">건강정보 <tspan font-size="9" fill-opacity="0.7">health_profiles</tspan></text>
  <text x="45" y="223" font-size="10.5" font-weight="600" fill="#1f1f1f">id<tspan dx="5" font-size="9" font-weight="400" fill="#8a8f98">PK</tspan></text>
  <text x="45" y="238" font-size="10.5" fill="#1f1f1f">사용자<tspan dx="5" font-size="9" fill="#8a8f98">FK→계정 · 1:1</tspan></text>
  <text x="45" y="253" font-size="10.5" fill="#1f1f1f">출생연도</text>
  <text x="45" y="268" font-size="10.5" fill="#1f1f1f">성별<tspan dx="5" font-size="9" fill="#8a8f98">남/여/기타</tspan></text>
  <text x="45" y="283" font-size="10.5" fill="#1f1f1f">임신 여부</text>
  <text x="45" y="298" font-size="10.5" fill="#1f1f1f">수유 여부</text>
  <text x="45" y="313" font-size="10.5" fill="#1f1f1f">수정일시</text>
</g>

<!-- ===== 복용약 medications ===== -->
<g>
  <rect x="35" y="360" width="190" height="120" rx="8" fill="#f4f5f7" stroke="#d4d8e0"/>
  <path d="M35,384 V368 Q35,360 43,360 H217 Q225,360 225,368 V384 Z" fill="#3b5bdb"/>
  <text x="45" y="376" font-size="12" font-weight="600" fill="#fff">복용약 <tspan font-size="9" fill-opacity="0.7">medications</tspan></text>
  <text x="45" y="398" font-size="10.5" font-weight="600" fill="#1f1f1f">id<tspan dx="5" font-size="9" font-weight="400" fill="#8a8f98">PK</tspan></text>
  <text x="45" y="413" font-size="10.5" fill="#1f1f1f">건강정보<tspan dx="5" font-size="9" fill="#8a8f98">FK</tspan></text>
  <text x="45" y="428" font-size="10.5" fill="#1f1f1f">약 이름</text>
  <text x="45" y="443" font-size="10.5" fill="#1f1f1f">약품코드<tspan dx="5" font-size="9" fill="#8a8f98">FK?→약</tspan></text>
  <text x="45" y="458" font-size="10.5" fill="#1f1f1f">메모</text>
  <text x="45" y="473" font-size="10.5" fill="#1f1f1f">등록일시</text>
</g>

<!-- ===== 알레르기 allergies ===== -->
<g>
  <rect x="240" y="360" width="160" height="105" rx="8" fill="#f4f5f7" stroke="#d4d8e0"/>
  <path d="M240,384 V368 Q240,360 248,360 H392 Q400,360 400,368 V384 Z" fill="#3b5bdb"/>
  <text x="250" y="376" font-size="12" font-weight="600" fill="#fff">알레르기 <tspan font-size="9" fill-opacity="0.7">allergies</tspan></text>
  <text x="250" y="398" font-size="10.5" font-weight="600" fill="#1f1f1f">id<tspan dx="5" font-size="9" font-weight="400" fill="#8a8f98">PK</tspan></text>
  <text x="250" y="413" font-size="10.5" fill="#1f1f1f">건강정보<tspan dx="5" font-size="9" fill="#8a8f98">FK</tspan></text>
  <text x="250" y="428" font-size="10.5" fill="#1f1f1f">항목 이름</text>
  <text x="250" y="443" font-size="10.5" fill="#1f1f1f">메모</text>
  <text x="250" y="458" font-size="10.5" fill="#1f1f1f">등록일시</text>
</g>

<!-- ===== 인식 scans ===== -->
<g>
  <rect x="445" y="170" width="200" height="135" rx="8" fill="#f4f5f7" stroke="#d4d8e0"/>
