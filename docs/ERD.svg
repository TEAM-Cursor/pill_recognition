  <text x="455" y="186" font-size="12" font-weight="600" fill="#fff">인식 <tspan font-size="9" fill-opacity="0.7">scans</tspan></text>
  <text x="455" y="208" font-size="10.5" font-weight="600" fill="#1f1f1f">id<tspan dx="5" font-size="9" font-weight="400" fill="#8a8f98">PK</tspan></text>
  <text x="455" y="223" font-size="10.5" fill="#1f1f1f">사용자<tspan dx="5" font-size="9" fill="#8a8f98">FK</tspan></text>
  <text x="455" y="238" font-size="10.5" fill="#1f1f1f">추출 속성<tspan dx="5" font-size="9" fill="#8a8f98">JSON · 각인/색/모양/분할선</tspan></text>
  <text x="455" y="253" font-size="10.5" fill="#1f1f1f">매칭 품목코드<tspan dx="5" font-size="9" fill="#8a8f98">FK?→약</tspan></text>
